<!DOCTYPE html>
<html>
<head>
    <title>Reloj en el Espejo</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1e1e2f, #0f0f1a);
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-bottom: 25px;
            color: #00ffff;
            letter-spacing: 1px;
            font-size: 40px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
            margin: 15px 0;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00ffff, #007bff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ffff;
        }

        #resultado {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            min-height: 30px;
            background-color: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="card">

<h2>Calcular Hora Real con Java Script</h2>

Ingrese hora vista en el espejo (HH:MM):
<input type="text" id="hora" placeholder="Ej: 10:25">
<button onclick="calcularHora()">Calcular</button>

<h3 id="resultado"></h3>

</div>

<script>

function calcularHora() {

    let entrada = document.getElementById("hora").value;

    let formato = /^\d{1,2}:\d{2}$/;

    if (!formato.test(entrada)) {
        document.getElementById("resultado").innerHTML =
        "Formato incorrecto. Use HH:MM";
        return;
    }

    let partes = entrada.split(":");

    let hora = parseInt(partes[0]);
    let minuto = parseInt(partes[1]);

    if (hora > 12 || minuto > 60) {
        document.getElementById("resultado").innerHTML =
        "Formato de hora o minuto no válido";
    }
    else {

        let hora_real = 12 - hora;
        let minuto_real = 60 - minuto;

        if (minuto_real == 60) {
            minuto_real = 0;
        }

        if (hora_real == 0) {
            hora_real = 12;
        }

        hora_real = hora_real.toString().padStart(2, "0");
        minuto_real = minuto_real.toString().padStart(2, "0");

        document.getElementById("resultado").innerHTML =
        "Hora real: " + hora_real + ":" + minuto_real;
    }
}

</script>

</body>
</html>
